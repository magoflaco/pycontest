<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PyContest — Concursos de Python con IA</title>
  <meta name="description" content="Plataforma de concursos de Python evaluados por IA. Compite, aprende y demuestra tu nivel." />
  <meta name="theme-color" content="#FFFFFF" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/main.css" />
  <script>
    // Apply saved theme BEFORE paint to avoid flash
    (function(){
      var t = localStorage.getItem('pc_theme');
      if (t === 'dark') document.documentElement.setAttribute('data-theme','dark');
      else if (t === 'light') document.documentElement.setAttribute('data-theme','light');
      else if (window.matchMedia('(prefers-color-scheme:dark)').matches) document.documentElement.setAttribute('data-theme','dark');
    })();
  </script>
</head>
<body>
  <div id="app"></div>
  <div id="toast-container"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
